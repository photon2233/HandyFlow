<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>HandyFlow</title>
    <style>
      :root { color-scheme: light dark; }
      body {
        font: 13px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 0;
        padding: 16px;
        width: 240px;
        background: #1b1d23;
        color: #f1f3f5;
      }
      h1 { font-size: 14px; margin: 0 0 4px; letter-spacing: 0.04em; }
      p.tag { margin: 0 0 14px; color: #9aa0a6; font-size: 11px; }
      button {
        width: 100%;
        padding: 10px 12px;
        border: 0;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: background 120ms;
      }
      button.on  { background: #ef4444; color: #fff; }
      button.off { background: #22c55e; color: #0b1410; }
      .status {
        display: flex; align-items: center; gap: 8px;
        margin-top: 12px; font-size: 11px; color: #9aa0a6;
      }
      .dot { width: 8px; height: 8px; border-radius: 50%; background: #6b7280; }
      .dot.live { background: #22c55e; }
      .hint { margin-top: 14px; font-size: 11px; color: #6b7280; line-height: 1.5; }
    </style>
  </head>
  <body>
    <h1>HandyFlow</h1>
    <p class="tag">Touchless control · all local</p>
    <button id="toggle" class="off">Start tracking</button>
    <div class="status"><span id="dot" class="dot"></span><span id="status">Stopped</span></div>
    <div class="hint">
      Point with your index finger to scroll.<br />
      Pinch (thumb + index) to play / pause video.
    </div>
    <script type="module" src="./popup.ts"></script>
  </body>
</html>
